<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>试剂库存管理系统</title>
<style>
  :root {
    --primary: #1a6b3c;
    --primary-light: #27ae60;
    --bg: #f0f4f0;
    --card: #fff;
    --text: #2c3e50;
    --muted: #7f8c8d;
    --border: #e0e4e8;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }
  .header { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; padding: 24px 24px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  .header h1 { font-size: 1.5em; margin-bottom: 4px; }
  .header p { opacity: 0.85; font-size: 0.9em; }
  .back-link { display: inline-block; margin-top: 6px; color: #fff; opacity: 0.8; font-size: 0.85em; text-decoration: none; }
  .back-link:hover { opacity: 1; text-decoration: underline; }
  .search-bar { position: sticky; top: 110px; z-index: 90; margin: 0 auto; padding: 12px 20px 0; max-width: 1200px; }
  .search-bar input { width: 100%; padding: 12px 18px; font-size: 1em; border: 2px solid var(--border); border-radius: 10px; outline: none; transition: border 0.2s; background: var(--card); box-shadow: var(--shadow); }
  .search-bar input:focus { border-color: var(--primary-light); }
  .search-hint { text-align: center; margin-top: 4px; font-size: 0.82em; color: var(--muted); }
  .controls { max-width: 1200px; margin: 12px auto 0; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .controls .result-count { font-size: 0.9em; color: var(--muted); margin-right: auto; }
  .tag { padding: 5px 14px; border-radius: 16px; cursor: pointer; font-size: 0.82em; border: 1px solid var(--border); background: #fff; transition: all 0.15s; user-select: none; }
  .tag.active { background: var(--primary-light); color: #fff; border-color: var(--primary-light); }
  .tag:hover { border-color: var(--primary-light); }
  .btn { padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.82em; border: 1px solid var(--border); background: #fff; transition: all 0.15s; font-family: inherit; }
  .btn:hover { background: #f0f0f0; border-color: #aaa; }
  .container { max-width: 1200px; margin: 12px auto 20px; padding: 0 20px; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); font-size: 0.88em; }
  thead { background: var(--primary); color: #fff; }
  th { padding: 10px 10px; text-align: left; font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { background: rgba(255,255,255,0.1); }
  th .sort-arrow { font-size: 0.7em; margin-left: 4px; opacity: 0.5; }
  th.sorted .sort-arrow { opacity: 1; }
  td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
  tr:hover { background: #f8faf8; }
  tr.low { background: #fff5f5; }
  tr.low:hover { background: #ffe8e8; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.8em; font-weight: 600; }
  .badge-ok { background: #e8f8e8; color: #27ae60; }
  .badge-warn { background: #fef9e7; color: #d4ac0d; }
  .badge-low { background: #fdedec; color: #e74c3c; }
  .loc-badge { display: inline-block; padding: 1px 8px; border-radius: 4px; background: #eaf2f8; color: #2980b9; font-size: 0.85em; }
  .no-result { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 1.1em; }
  .footer { text-align: center; padding: 16px; color: var(--muted); font-size: 0.8em; }
  .stats { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
  .stat-card { background: var(--card); border-radius: 10px; padding: 12px 18px; box-shadow: var(--shadow); flex: 1; min-width: 120px; text-align: center; }
  .stat-card .num { font-size: 1.6em; font-weight: 700; color: var(--primary); }
  .stat-card .label { font-size: 0.78em; color: var(--muted); margin-top: 2px; }
  @media (max-width: 768px) { table { font-size: 0.78em; } th, td { padding: 6px 6px; } .controls { gap: 4px; } .tag { font-size: 0.75em; padding: 3px 10px; } }

  /* Password gate */
  .pwd-overlay {
    position: fixed; inset: 0; z-index: 99999;
    background: linear-gradient(135deg, #1a5276, #2980b9);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
  }
  .pwd-overlay.hidden { display: none !important; }
  .pwd-box {
    background: #fff; border-radius: 20px; padding: 48px 40px 40px;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 380px; width: 90%;
  }
  .pwd-box .icon { font-size: 3em; margin-bottom: 12px; }
  .pwd-box h2 { color: #1a5276; margin-bottom: 6px; font-size: 1.3em; }
  .pwd-box p.sub { color: #7f8c8d; margin-bottom: 24px; font-size: 0.9em; }
  .pwd-box input[type="password"] {
    width: 100%; padding: 12px 16px; border: 2px solid #e0e4e8; border-radius: 10px;
    font-size: 1em; outline: none; transition: border 0.2s; box-sizing: border-box;
  }
  .pwd-box input[type="password"]:focus { border-color: #2980b9; }
  .pwd-box .error { color: #e74c3c; font-size: 0.85em; margin-top: 8px; min-height: 1.5em; }
  .pwd-box button {
    width: 100%; margin-top: 14px; padding: 12px; background: #2980b9; color: #fff;
    border: none; border-radius: 10px; font-size: 1em; cursor: pointer; font-weight: 600;
    transition: background 0.2s;
  }
  .pwd-box button:hover { background: #1a5276; }
  .pwd-box .footer-text { color: #bdc3c7; font-size: 0.78em; margin-top: 20px; }

</style>
</head>
<body>

<div id="pwdOverlay" class="pwd-overlay">
  <div class="pwd-box">
    <div class="icon">🔒</div>
    <h2>访问受限</h2>
    <p class="sub">请输入访问密码</p>
    <input type="password" id="pwdInput" placeholder="请输入密码" autofocus>
    <div class="error" id="pwdError"></div>
    <button onclick="verifyPassword()">确认</button>
    <div class="footer-text">材化学院 · 内部使用</div>
  </div>
</div>

<div class="header">
  <h1>🧪 试剂库存管理系统</h1>
  <p>材化学院 · 李洋 · lycrystal@wxc.edu.cn</p>
  <a href="/" class="back-link">&larr; 返回首页</a>
</div>
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 搜索试剂名称、CAS号、品牌、货号、位置…" autofocus>
  <div class="search-hint">Ctrl+K 聚焦 · Esc 清空 · 点击表头排序</div>
</div>
<div class="controls">
  <span class="result-count" id="resultCount"></span>
  <span class="tag active" onclick="filterCat('all',this)">全部</span>
  <span class="tag" onclick="filterCat('试剂',this)">试剂</span>
  <span class="tag" onclick="filterCat('耗材',this)">耗材</span>
  <span class="tag" onclick="filterCat('溶剂',this)">溶剂</span>
  <span class="tag" onclick="filterCat('标准品',this)">标准品</span>
  <button class="btn" onclick="filterLow()" id="lowBtn">⚠️ 库存不足</button>
</div>
<div class="container">
  <div class="stats" id="statsBar"></div>
  <div id="tableContainer"></div>
</div>
<div class="footer">皖西学院材化学院 · 李洋 · lycrystal@wxc.edu.cn</div>

<script>
const rawData = JSON.parse(document.getElementById('rawData').textContent);
const data = rawData.map((item, idx) => ({ ...item, _id: idx + 1 }));
let currentFilter = 'all', lowOnly = false, sortField = null, sortDir = 1, searchQuery = '';
const cols = [
  { key: '_id', label: '#', w: '40px' },
  { key: 'name', label: '名称' },
  { key: 'cas', label: 'CAS号', w: '130px' },
  { key: 'spec', label: '规格', w: '80px' },
  { key: 'brand', label: '厂家', w: '80px' },
  { key: 'purity', label: '纯度', w: '70px' },
  { key: 'code', label: '货号', w: '120px' },
  { key: 'loc', label: '位置', w: '70px' },
  { key: 'qty', label: '数量', w: '60px' },
  { key: 'mw', label: '分子量', w: '80px' },
  { key: 'solubility', label: '溶解情况' },
  { key: 'toxicity', label: '毒性' },
  { key: 'notes', label: '备注' }
];

function getItems() {
  let items = [...data];
  if (currentFilter !== 'all') items = items.filter(i => i.cat === currentFilter);
  if (lowOnly) items = items.filter(i => i.qty <= 2);
  let q = searchQuery.trim().toLowerCase();
  if (q) items = items.filter(i => (i.name+' '+i.cas+' '+i.brand+' '+i.code+' '+i.loc+' '+i.solubility+' '+i.notes).toLowerCase().includes(q));
  if (sortField) items.sort((a,b) => { let va=a[sortField], vb=b[sortField]; if(typeof va==='string') va=va.toLowerCase(); if(typeof vb==='string') vb=vb.toLowerCase(); return va<vb ? -1*sortDir : va>vb ? 1*sortDir : 0; });
  return items;
}

function render() {
  const items = getItems();
  document.getElementById('resultCount').textContent = `共 ${items.length} / ${data.length} 条记录`;
  const low = data.filter(i => i.qty <= 2).length;
  const zero = data.filter(i => i.qty === 0).length;
  document.getElementById('statsBar').innerHTML =
    `<div class="stat-card"><div class="num">${data.length}</div><div class="label">总试剂数</div></div>
     <div class="stat-card"><div class="num">${data.reduce((s,i) => s + (typeof i.qty === 'number' ? i.qty : 0), 0)}</div><div class="label">总数量</div></div>
     <div class="stat-card"><div class="num" style="color:#d4ac0d;">${low}</div><div class="label">库存不足(≤2)</div></div>
     <div class="stat-card"><div class="num" style="color:#e74c3c;">${zero}</div><div class="label">已用完(=0)</div></div>`;
  if (items.length === 0) { document.getElementById('tableContainer').innerHTML = '<div class="no-result">😕 没有匹配的记录</div>'; return; }
  let html = '<table><thead><tr>';
  cols.forEach(c => {
    const s = sortField === c.key;
    html += `<th class="${s?'sorted':''}" onclick="sortBy('${c.key}')" ${c.w?'style="width:'+c.w+'"':''}>${c.label}<span class="sort-arrow">${s?(sortDir===1?'▲':'▼'):'▽'}</span></th>`;
  });
  html += '</tr></thead><tbody>';
  items.forEach(item => {
    html += `<tr class="${item.qty<=2?'low':''}">`;
    cols.forEach(c => {
      let val = item[c.key];
      if (c.key === 'qty') {
        if (val <= 0) html += '<td><span class="badge badge-low">0</span></td>';
        else if (val <= 2) html += '<td><span class="badge badge-warn">'+val+'</span></td>';
        else html += '<td><span class="badge badge-ok">'+val+'</span></td>';
      } else if (c.key === 'loc' && val) {
        html += '<td><span class="loc-badge">'+val+'</span></td>';
      } else {
        html += '<td>'+(val||'')+'</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tableContainer').innerHTML = html;
}

function sortBy(field) { if (sortField === field) { sortDir *= -1; } else { sortField = field; sortDir = 1; } render(); }
function filterCat(cat, el) { currentFilter = cat; lowOnly = false; document.querySelectorAll('.controls .tag').forEach(t => t.classList.remove('active')); if(el) el.classList.add('active'); document.getElementById('lowBtn').style.background = '#fff'; render(); }
function filterLow() { lowOnly = !lowOnly; document.getElementById('lowBtn').style.background = lowOnly ? '#fee' : '#fff'; if(lowOnly){ currentFilter='all'; document.querySelectorAll('.controls .tag').forEach(t=>t.classList.remove('active')); document.querySelector('.controls .tag').classList.add('active'); } render(); }
document.getElementById('searchInput').addEventListener('input', function() { searchQuery = this.value; render(); });
document.addEventListener('keydown', function(e) { if(e.ctrlKey&&e.key==='k'){ e.preventDefault(); document.getElementById('searchInput').focus(); } if(e.key==='Escape'){ document.getElementById('searchInput').value=''; searchQuery=''; render(); } });
render();
</script>

<script>
(function() {
  const PWD_HASH = "211ca52ac11849ff8a2d2d7b919b2d985b6dbb781fcaa444b3d506d81baf8f41";
  const SESSION_KEY = "wxc_auth_v1";

  async function sha256(str) {
    const buf = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function checkAuth() {
    if (localStorage.getItem(SESSION_KEY) === '1') {
      document.getElementById('pwdOverlay').classList.add('hidden');
      return;
    }
    document.getElementById('pwdOverlay').classList.remove('hidden');
  }

  window.verifyPassword = async function() {
    const input = document.getElementById('pwdInput');
    const err = document.getElementById('pwdError');
    const hash = await sha256(input.value);
    if (hash === PWD_HASH) {
      localStorage.setItem(SESSION_KEY, '1');
      document.getElementById('pwdOverlay').classList.add('hidden');
      err.textContent = '';
    } else {
      err.textContent = '密码错误，请重试';
      input.value = '';
      input.focus();
    }
  };

  document.addEventListener('DOMContentLoaded', function() {
    checkAuth();
    document.getElementById('pwdInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') window.verifyPassword();
    });
  });
})();
</script>

</body>
</html>
